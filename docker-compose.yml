services:
  postgres:
    image: postgres:16-alpine
    container_name: blog002-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-blog002}
      POSTGRES_USER: ${POSTGRES_USER:-blog002}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blog002}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blog002} -d ${POSTGRES_DB:-blog002}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2026-03-15T17-29-55Z
    container_name: blog002-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: blog002-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-8080}
      DATABASE_URL: postgres://${POSTGRES_USER:-blog002}:${POSTGRES_PASSWORD:-blog002}@postgres:5432/${POSTGRES_DB:-blog002}
      DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-10}
      DB_CONNECT_TIMEOUT_SECS: ${DB_CONNECT_TIMEOUT_SECS:-5}
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-32-char-minimum-secret}
      JWT_EXPIRES_MINUTES: ${JWT_EXPIRES_MINUTES:-60}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-blog002-local}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-http://localhost:9000/blog002-local}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: blog002-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      FRONTEND_PORT: ${FRONTEND_PORT:-8080}
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "${FRONTEND_HOST_PORT:-8081}:8080"

volumes:
  postgres_data:
  minio_data:
